<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Cláudia Hortifruti">
  <defs>
    <radialGradient id="cl-green" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#6cb441"/>
      <stop offset="100%" stop-color="#2f6b1f"/>
    </radialGradient>
    <linearGradient id="cl-ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f7de"/>
      <stop offset="100%" stop-color="#dde7bc"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <circle cx="60" cy="60" r="58" fill="#194512"/>
  <circle cx="60" cy="60" r="49" fill="url(#cl-green)"/>
  <path d="M20 42 a45 45 0 0 1 80 -8 a49 49 0 0 0 -80 8 z" fill="#ffffff" opacity=".08"/>

  <!-- folhas atrás -->
  <path d="M60 22 q11 6 6 21 q-11 -4 -6 -21 z" fill="#3f8f2a"/>
  <path d="M65 24 q13 3 14 17 q-13 -1 -14 -17 z" fill="#4c9e33"/>

  <!-- uvas -->
  <g fill="#7a3d8f">
    <circle cx="33" cy="52" r="4.2"/><circle cx="39" cy="50" r="4.2"/><circle cx="36" cy="57" r="4.2"/>
    <circle cx="42" cy="56" r="4.2"/><circle cx="39" cy="62" r="4.2"/>
  </g>
  <!-- maçã -->
  <circle cx="53" cy="52" r="9" fill="#d6382b"/>
  <circle cx="50" cy="49" r="3" fill="#ffffff" opacity=".35"/>
  <!-- laranja -->
  <circle cx="62" cy="39" r="7.5" fill="#ef8b1f"/>
  <circle cx="60" cy="37" r="2.4" fill="#ffffff" opacity=".35"/>
  <!-- tomate -->
  <circle cx="73" cy="52" r="8" fill="#e5402f"/>
  <path d="M73 45 l-3 -3 M73 45 l3 -3 M73 45 l0 -4" stroke="#3f8f2a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- pimentão amarelo -->
  <path d="M83 45 q6 0 6 7.5 q0 8.5 -6 9.5 q-5.5 -1 -5.5 -9.5 q0 -6.5 5.5 -7.5 z" fill="#f4c320"/>
  <path d="M83.5 44 l0 -3" stroke="#3f8f2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- morango -->
  <path d="M57 60 q7 1 6 8 q-1 6 -6 9 q-5 -3 -6 -9 q-1 -7 6 -8 z" fill="#e23b2e"/>
  <path d="M57 59 l-4 -3 M57 59 l4 -3 M57 59 l0 -4" stroke="#3f8f2a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <g fill="#ffe9a8"><circle cx="55" cy="66" r=".8"/><circle cx="59" cy="67" r=".8"/><circle cx="57" cy="70.5" r=".8"/></g>

  <!-- fita -->
  <path d="M8 73 L112 73 L104 83.5 L112 94 L8 94 L16 83.5 Z" fill="url(#cl-ribbon)" stroke="#c7d39a" stroke-width="1"/>
  <text x="60" y="87.5" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-weight="700" font-size="15" fill="#e8791a">Cláudia</text>

  <!-- subtítulo -->
  <text x="60" y="106" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="8" letter-spacing="1.6" fill="#eef4d9">HORTIFRUTI</text>
</svg>
